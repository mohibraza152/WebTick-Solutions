<html lang="en">

<head>

  <meta property="og:site_name" content="WebTick Solutions">

  <meta property="og:description"

  <meta property="og:url"
        content="https://webticksolutions.com/signup">

        content="https://webticksolutions.com/assets/img/WS_1.png">

  <!-- Twitter -->

</head>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background-color: #2f6c80;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.error-message {
  color: red;
  font-size: 13px;
  margin-top: -10px;
  margin-bottom: 10px;
  display: block;
}

.signup-card {
  background: #fff;
  padding: 40px 30px;
  border-radius: 12px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  width: 100%;
  max-width: 400px;
  text-align: center;
}

.signup-card h2 {
  margin-bottom: 25px;
  font-size: 28px;
  color: #111827;
}

.signup-card form {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.signup-card input {
  padding: 12px 15px;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #d1d5db;
  outline: none;
  transition: 0.2s all;
}

.signup-card input:focus {
  border-color: #2f6c80;
  box-shadow: 0 0 5px rgba(59,130,246,0.3);
}

.signup-card button {
  padding: 12px;
  font-size: 16px;
  font-weight: 500;
  border-radius: 8px;
  border: none;
  background-color: #2f6c80;
  color: #fff;
  cursor: pointer;
  transition: 0.2s all;
}

.signup-card button:hover {
  background-color: #2f6c80;
}

.signup-card .switch-link {
  margin-top: 15px;
  font-size: 14px;
  color: #6b7280;
}

.signup-card .switch-link a {
  color: #2f6c80;
  text-decoration: none;
  font-weight: 500;
}

.signup-card .switch-link a:hover {
  text-decoration: underline;
}

 .policy-check {
  margin: 15px 0;
  font-size: 14px;
  color: #333;
}

.policy-check label {
  display: flex;
  align-items: flex-start;
  gap: 6px;
  cursor: pointer;
}

.policy-check input[type="checkbox"] {
  margin-top: 4px;
  accent-color: #2f6c80; /* tumhari blue theme */
}

.policy-check a {
  color: #2f6c80;
  text-decoration: underline;
}

.policy-check a:hover {
  opacity: 0.85;
}
</style>
</head>
<body>
  <div class="signup-card">
    <h2>Create Your Account</h2>
    <form id="signupForm">
      <input type="email" id="email" placeholder="Email" required />
      <span id="emailError" class="error-message"></span>

      <input type="password" id="password" placeholder="Password" required />
      <span id="passwordError" class="error-message"></span>

       <div class="policy-check">
  <label>
    <input type="checkbox" class="policy-checkbox" required>
    I agree to the
    <a href="policy.html">Privacy Policy</a>
    and
    <a href="T&C.html">Terms & Conditions</a>
  </label>
</div>

      <button type="submit">Sign Up</button>
      <span id="serverError" class="error-message"></span>
    </form>

    <p class="switch-link">Already have an account? <a href="login.html">Login</a></p>
  </div>

<script>
const signupForm = document.getElementById('signupForm');
const emailError = document.getElementById('emailError');
const passwordError = document.getElementById('passwordError');
const serverError = document.getElementById('serverError');

signupForm.addEventListener('submit', async (e) => {
  e.preventDefault();

  // Reset errors
  emailError.textContent = '';
  passwordError.textContent = '';
  serverError.textContent = '';

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();

  let hasError = false;

  // Email validation
  if (!email) {
    emailError.textContent = "Email is required";
    hasError = true;
  } else {
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
      emailError.textContent = "Please enter a valid email";
      hasError = true;
    }
  }

  // Password validation
  if (!password) {
    passwordError.textContent = "Password is required";
    hasError = true;
  } else if (password.length < 6) {
    passwordError.textContent = "Password must be at least 6 characters";
    hasError = true;
  }

  if (hasError) return; // stop submission if validation fails

  // Server request
  try {
    const response = await fetch('/api/auth/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await response.json();

   if (response.ok) {
    alert("Signup successful!");
    window.location.href = "login.html";
} else {
    serverError.textContent = data.message || "Signup failed";
}
  } catch (err) {
    serverError.textContent = "Server not reachable. Please try again later.";
    console.error(err);
  }
});
</script>

<script src="assets/js/auth-guard.js"></script>

<script>
blockAuthPages(); // Keep this to block signup if already logged in
</script>

</body>
</html>
